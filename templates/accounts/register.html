{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="auth-container">
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
            
            <form method="POST" action="{% url 'register' %}" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Имя</label>
                    <input type="text" name="name" required placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" name="password" required placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Подтвердите пароль</label>
                    <input type="password" name="password2" required placeholder="Повторите пароль">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>
            </form>
            
            <p class="auth-footer">
                Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
