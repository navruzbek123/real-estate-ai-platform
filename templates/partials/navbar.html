{% load static %}
<nav class="navbar" id="navbar">
    <div class="container">
        <div class="navbar-brand">
            <a href="{% url 'home' %}">
                <i class="fas fa-home"></i>
                <span>EstatePro</span>
            </a>
        </div>
        
        <button class="navbar-toggle" id="navbarToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="navbar-menu" id="navbarMenu">
            <ul class="navbar-nav">
                <li><a href="{% url 'listings' %}"><i class="fas fa-list"></i> Объявления</a></li>
                <li><a href="{% url 'search' %}"><i class="fas fa-search"></i> Поиск</a></li>
                <li><a href="{% url 'ai-estimate-public' %}"><i class="fas fa-robot"></i> AI Оценка</a></li>
            </ul>
            
            <div class="navbar-actions">
                <button class="dark-mode-toggle" id="darkModeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                
                {% if user.is_authenticated %}
                    <a href="{% url 'favorites' %}" class="nav-icon-btn" title="Избранное">
                        <i class="fas fa-heart"></i>
                        <span class="badge" id="favBadge">0</span>
                    </a>
                    <a href="{% url 'inbox' %}" class="nav-icon-btn" title="Сообщения">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a href="{% url 'notifications' %}" class="nav-icon-btn" title="Уведомления">
                        <i class="fas fa-bell"></i>
                    </a>
                    
                    <div class="dropdown">
                        <button class="btn btn-outline dropdown-toggle">
                            <i class="fas fa-user-circle"></i>
                            {{ user.name|truncatechars:12 }}
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-menu">
                            <a href="{% url 'profile' %}"><i class="fas fa-user"></i> Профиль</a>
                            <a href="{% url 'favorites' %}"><i class="fas fa-heart"></i> Избранное</a>
                            <a href="{% url 'inbox' %}"><i class="fas fa-envelope"></i> Сообщения</a>
                            <a href="{% url 'payment-history' %}"><i class="fas fa-credit-card"></i> Платежи</a>
                            <hr>
                            <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                        </div>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline">Войти</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<script>
$(document).ready(function() {
    {% if user.is_authenticated %}
    $.ajax({
        url: '/accounts/api/profile/',
        method: 'GET',
        error: function() {}
    });
    {% endif %}
    
    $('#darkModeToggle').on('click', function() {
        var isDark = $('body').toggleClass('dark-mode').hasClass('dark-mode');
        $(this).find('i').toggleClass('fa-moon fa-sun');
        $.post('/accounts/dark-mode/', {dark_mode: isDark, csrfmiddlewaretoken: '{{ csrf_token }}'});
    });
    
    $('#navbarToggle').click(function() {
        $('#navbarMenu').toggleClass('active');
    });
    
    $('.dropdown-toggle').click(function() {
        $(this).next('.dropdown-menu').toggle();
    });
});
</script>
