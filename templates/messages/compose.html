{% extends 'base.html' %}
{% load static %}

{% block title %}Новое сообщение{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="section-title"><i class="fas fa-pen"></i> Новое сообщение</h1>
        
        <div class="messages-tabs">
            <a href="{% url 'inbox' %}" class="tab">Входящие</a>
            <a href="{% url 'sent' %}" class="tab">Отправленные</a>
            <a href="{% url 'compose' %}" class="tab active">Новое</a>
        </div>
        
        <form action="{% url 'send-message' %}" method="POST" class="compose-form">
            {% csrf_token %}
            <input type="hidden" name="listing_id" value="{{ listing_id }}">
            
            <div class="form-group">
                <label>Получатель ID</label>
                <input type="number" name="recipient_id" value="{{ recipient_id }}" required placeholder="ID пользователя">
            </div>
            
            <div class="form-group">
                <label>Тема</label>
                <input type="text" name="subject" placeholder="Тема сообщения">
            </div>
            
            <div class="form-group">
                <label>Сообщение</label>
                <textarea name="body" rows="8" required placeholder="Введите текст сообщения..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> Отправить
            </button>
        </form>
    </div>
</section>
{% endblock %}
